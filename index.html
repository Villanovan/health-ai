<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitWare Health AI - Rwanda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .chat-container { height: calc(100vh - 180px); }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(229, 231, 235, 1);
        }
        #chat-messages::-webkit-scrollbar, .custom-scroll::-webkit-scrollbar { width: 6px; }
        #chat-messages::-webkit-scrollbar-track, .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        #chat-messages::-webkit-scrollbar-thumb, .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        .prose-sm ul { list-style-type: disc; margin-left: 1.25rem; margin-bottom: 1rem; }
        .prose-sm ol { list-style-type: decimal; margin-left: 1.25rem; margin-bottom: 1rem; }
        .prose-sm li { margin-bottom: 0.25rem; }
        .prose-sm p { margin-bottom: 0.75rem; }
        .prose-sm strong { font-weight: 600; color: #1e3a8a; }

        #main-sidebar {
            transition: transform 0.3s ease-in-out;
        }
        @media (max-width: 1024px) {
            #main-sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100vh;
                z-index: 100;
                width: 280px;
                transform: translateX(-100%);
            }
            #main-sidebar.active {
                transform: translateX(0);
            }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- Sidebar Overlay (Mobile) -->
    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-slate-900/40 z-[90] hidden backdrop-blur-sm transition-opacity"></div>

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 glass-morphism px-4 lg:px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <button onclick="toggleSidebar()" class="lg:hidden p-2 hover:bg-slate-100 rounded-lg text-slate-600 transition-colors">
                <i data-lucide="menu"></i>
            </button>
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <i data-lucide="stethoscope"></i>
                </div>
                <h1 class="text-lg lg:text-xl font-bold tracking-tight text-blue-900">BitWare <span id="nav-subtitle" class="hidden sm:inline font-light text-slate-500 text-sm">Health AI</span></h1>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="window.location.href='tel:112'" class="bg-red-50 text-red-600 px-3 lg:px-4 py-2 rounded-full text-xs lg:text-sm font-semibold hover:bg-red-100 transition-colors flex items-center gap-2">
                <i data-lucide="phone-call" class="w-4 h-4"></i>
                <span id="btn-emergency">Emergency (112)</span>
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-6 p-4 lg:p-6">
        
        <!-- Sidebar Info -->
        <aside id="main-sidebar" class="bg-white lg:bg-transparent lg:flex flex-col gap-4 col-span-1 p-6 lg:p-0 border-r lg:border-none border-slate-200">
            
            <div class="flex justify-between items-center mb-4 lg:hidden">
                <span class="font-bold text-blue-900">Menu</span>
                <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-100 rounded-full">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <button onclick="startNewChat(true)" class="w-full bg-blue-600 text-white p-3 rounded-xl font-semibold flex items-center justify-center gap-2 shadow-md hover:bg-blue-700 transition-all active:scale-95 mb-2">
                <i data-lucide="plus" class="w-5 h-5"></i>
                <span id="btn-new-chat">New Chat</span>
            </button>

            <div class="bg-white lg:bg-white/80 p-4 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="font-bold text-slate-800 mb-3 flex items-center gap-2 text-sm">
                    <i data-lucide="languages" class="w-4 h-4 text-blue-500"></i>
                    <span id="label-language">Language</span>
                </h3>
                <select id="language-select" onchange="changeLanguage(this.value)" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="kin">Kinyarwanda</option>
                    <option value="en">English</option>
                    <option value="fr">Français</option>
                </select>
            </div>

            <div class="flex-1 bg-white lg:bg-white/80 p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-col overflow-hidden min-h-[300px] lg:min-h-0">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="font-bold text-slate-800 flex items-center gap-2 text-sm">
                        <i data-lucide="history" class="w-4 h-4 text-blue-500"></i>
                        <span id="label-history">Recent Chats</span>
                    </h3>
                    <button onclick="clearAllHistory()" class="text-[10px] text-red-400 hover:text-red-600 uppercase font-bold tracking-wider" id="btn-clear-all">Clear All</button>
                </div>
                
                <div id="history-list" class="flex-1 overflow-y-auto custom-scroll space-y-2">
                    <!-- History items -->
                </div>
            </div>

            <div class="bg-blue-600 p-5 rounded-2xl shadow-lg text-white mt-auto lg:mt-0">
                <i data-lucide="shield-check" class="mb-3"></i>
                <h3 id="label-verified-title" class="font-bold mb-2 text-sm">Verified Advice</h3>
                <p id="label-verified-desc" class="text-[11px] opacity-90 leading-relaxed">
                    Information is based on Rwanda MoH protocols. This AI provides guidance, not official diagnosis.
                </p>
            </div>
        </aside>

        <!-- Chat Interface -->
        <div class="lg:col-span-3 flex flex-col bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden h-[calc(100vh-140px)] lg:h-[calc(100vh-120px)]">
            <div id="chat-messages" class="chat-container overflow-y-auto p-4 lg:p-6 flex flex-col gap-4 bg-slate-50/50 flex-1"></div>

            <div class="p-3 lg:p-4 border-t border-slate-100 bg-white">
                <form id="chat-form" onsubmit="event.preventDefault(); handleSendMessage();" class="flex gap-2 items-center bg-slate-100 p-1.5 lg:p-2 rounded-xl focus-within:ring-2 focus-within:ring-blue-500 focus-within:bg-white transition-all">
                    <button type="button" onclick="startVoiceInput()" id="voice-btn" class="p-2 text-slate-400 hover:text-blue-500 transition-colors">
                        <i data-lucide="mic" class="w-5 h-5"></i>
                    </button>
                    <input 
                        type="text" 
                        id="user-input"
                        placeholder="Type your health question here..." 
                        class="flex-1 bg-transparent border-none outline-none text-sm p-2 text-slate-700"
                        autocomplete="off"
                    >
                    <button 
                        type="submit"
                        class="bg-blue-600 text-white p-2.5 rounded-lg hover:bg-blue-700 shadow-md transition-all active:scale-95"
                    >
                        <i data-lucide="send-horizontal" class="w-5 h-5"></i>
                    </button>
                </form>
                <div id="api-status" class="flex justify-center items-center gap-1 mt-2">
                    <div id="status-dot" class="w-1.5 h-1.5 rounded-full bg-green-500"></div>
                    <p id="status-text" class="text-[9px] lg:text-[10px] text-slate-400 uppercase tracking-widest font-semibold">Gemini AI Active</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const apiKey = "AIzaSyCKQ91pdU6Ghje91H4nKMFKDB8FyZrqoko"; // API Key provided by environment
        const modelName = "gemini-1.5-flash";
            
        const translations = {
            en: {
                welcome: "Hello! I am BitWare Health AI. I can help you with medical information based on Rwandan health protocols. How can I help today?",
                placeholder: "Type your health question here...",
                navSubtitle: "Health AI",
                emergency: "Emergency (112)",
                languageLabel: "Language",
                historyLabel: "Recent Chats",
                newChat: "New Chat",
                clearAll: "Clear All",
                verifiedTitle: "Verified Advice",
                verifiedDesc: "Information is based on Rwanda MoH protocols. This AI provides guidance, not official diagnosis.",
                error: "I'm having trouble connecting to the health service. Please try again in a moment.",
            },
            kin: {
                welcome: "Muraho! Njyewe ndi BitWare Health AI. Nshobora kugufasha kumenya amakuru ku buzima yizewe mu Rwanda. Nagufasha iki uyu munsi?",
                placeholder: "Andika hano ikibazo ufite ku buzima...",
                navSubtitle: "Ubuzima AI",
                emergency: "Ubutabazi (112)",
                languageLabel: "Ururimi",
                historyLabel: "Ibiganiro bishize",
                newChat: "Tangira bundi bushya",
                clearAll: "Siba byose",
                verifiedTitle: "Inama Nizewe",
                verifiedDesc: "Amakuru akomoka mu mabwiriza ya Minisiteri y'Ubuzima mu Rwanda. Iyi AI itanga inama, si ubuvuzi bw'abaganga.",
                error: "Hari ikibazo mu guhuza n'ububiko. Ongera ugerageze mu kanya.",
            },
            fr: {
                welcome: "Bonjour ! Je suis BitWare Health AI. Je peux vous aider avec des informations médicales basées sur les protocoles rwandais. Comment puis-je vous aider ?",
                placeholder: "Posez votre question de santé ici...",
                navSubtitle: "Santé IA",
                emergency: "Urgence (112)",
                languageLabel: "Langue",
                historyLabel: "Discussions récentes",
                newChat: "Nouvelle discussion",
                clearAll: "Tout effacer",
                verifiedTitle: "Conseils Vérifiés",
                verifiedDesc: "Les informations sont basées sur les protocoles du MoH Rwanda. Cette IA fournit des conseils, pas un diagnostic officiel.",
                error: "Problème de connexion au service de santé. Veuillez réessayer dans un instant.",
            }
        };

        let currentLang = 'kin';
        let chatContext = []; 
        
        const chatContainer = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');

        window.onload = () => {
            lucide.createIcons();
            updateUIStrings();
            startNewChat(false); 
        };

        function toggleSidebar() {
            const sidebar = document.getElementById('main-sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            const isActive = sidebar.classList.toggle('active');
            
            if (isActive) {
                overlay.classList.remove('hidden');
            } else {
                overlay.classList.add('hidden');
            }
            lucide.createIcons();
        }

        function formatMarkdown(text) {
            if (!text) return "";
            let formatted = text
                .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/^\s*[*|-]\s+(.*)$/gm, '<li>$1</li>')
                .replace(/(<li>.*<\/li>)/gms, '<ul class="my-2">$1</ul>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>');

            return `<div class="prose-sm"><p>${formatted}</p></div>`;
        }

        async function fetchWithRetry(url, options, retries = 5, backoff = 1000) {
            try {
                const response = await fetch(url, options);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                return await response.json();
            } catch (error) {
                if (retries > 0) {
                    await new Promise(resolve => setTimeout(resolve, backoff));
                    return fetchWithRetry(url, options, retries - 1, backoff * 2);
                }
                throw error;
            }
        }

        async function callGeminiAPI(query) {
            const systemPrompt = `You are BitWare Health AI, a specialized medical assistant for Rwanda. 
            Language: Respond ONLY in ${currentLang}. 
            Guidelines: Strictly follow Rwandan Ministry of Health (MoH) protocols. 
            Triage: If symptoms sound severe (e.g., chest pain, severe bleeding, difficulty breathing), immediately advise calling 112 emergency.
            Tone: Professional, empathetic, and culturally appropriate.
            Disclaimer: Remind users you are an AI assistant and they should consult a professional doctor for official diagnosis.`;

            const contents = chatContext.map(msg => ({
                role: msg.role === 'user' ? 'user' : 'model',
                parts: [{ text: msg.text }]
            }));
            contents.push({ role: 'user', parts: [{ text: query }] });

            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;

            try {
                const result = await fetchWithRetry(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: contents,
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });

                if (result.candidates?.[0]?.content) {
                    const botResponse = result.candidates[0].content.parts[0].text;
                    chatContext.push({ role: 'user', text: query });
                    chatContext.push({ role: 'model', text: botResponse });
                    return botResponse;
                }
                throw new Error("Invalid response structure");
            } catch (e) {
                console.error("API Error:", e);
                return translations[currentLang].error;
            }
        }

        function startVoiceInput() {
            const btn = document.getElementById('voice-btn');
            btn.classList.add('text-red-500', 'animate-pulse');
            // Simplified: In a real app, integrate Web Speech API here
            setTimeout(() => btn.classList.remove('text-red-500', 'animate-pulse'), 3000);
        }

        async function handleSendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage('user', text);
            userInput.value = "";
            const typingId = showTypingIndicator();

            const responseRaw = await callGeminiAPI(text);
            removeTypingIndicator(typingId);
            appendMessage('bot', responseRaw);
            saveToHistory(text);
        }

        function saveToHistory(text) {
            const historyList = document.getElementById('history-list');
            const summary = text.length > 25 ? text.substring(0, 22) + "..." : text;
            const id = Date.now();
            
            const item = document.createElement('div');
            item.id = `hist-${id}`;
            item.className = "p-2 hover:bg-slate-50 rounded-lg cursor-pointer group flex justify-between items-center border border-transparent hover:border-slate-100";
            item.innerHTML = `
                <div class="flex items-center gap-2 overflow-hidden flex-1" onclick="loadFromHistory('${text.replace(/'/g, "\\'")}')">
                    <i data-lucide="message-square" class="w-3 h-3 text-slate-400 shrink-0"></i>
                    <span class="text-xs text-slate-600 truncate">${summary}</span>
                </div>
                <button onclick="deleteHistoryItem(${id})" class="opacity-0 group-hover:opacity-100 p-1 hover:text-red-500 transition-opacity">
                    <i data-lucide="trash-2" class="w-3 h-3"></i>
                </button>
            `;
            historyList.prepend(item);
            lucide.createIcons();
        }

        function loadFromHistory(text) {
            if (window.innerWidth < 1024) toggleSidebar();
            userInput.value = text;
            handleSendMessage();
        }

        function deleteHistoryItem(id) {
            const item = document.getElementById(`hist-${id}`);
            if (item) item.remove();
        }

        function clearAllHistory() {
            document.getElementById('history-list').innerHTML = "";
        }

        function startNewChat(shouldCloseSidebar = false) {
            chatContainer.innerHTML = "";
            chatContext = [];
            userInput.value = "";
            appendMessage('bot', translations[currentLang].welcome);
            if (shouldCloseSidebar && window.innerWidth < 1024) toggleSidebar();
        }

        function changeLanguage(lang) {
            currentLang = lang;
            updateUIStrings();
            startNewChat(true);
        }

        function updateUIStrings() {
            const t = translations[currentLang];
            document.getElementById('nav-subtitle').innerText = t.navSubtitle;
            document.getElementById('btn-emergency').innerText = t.emergency;
            document.getElementById('label-language').innerText = t.languageLabel;
            document.getElementById('label-history').innerText = t.historyLabel;
            document.getElementById('btn-new-chat').innerText = t.newChat;
            document.getElementById('btn-clear-all').innerText = t.clearAll;
            document.getElementById('label-verified-title').innerText = t.verifiedTitle;
            document.getElementById('label-verified-desc').innerText = t.verifiedDesc;
            document.getElementById('user-input').placeholder = t.placeholder;
        }

        function appendMessage(role, text) {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const messageDiv = document.createElement('div');
            messageDiv.className = role === 'user' 
                ? "flex gap-2 lg:gap-3 max-w-[90%] lg:max-w-[85%] self-end flex-row-reverse"
                : "flex gap-2 lg:gap-3 max-w-[95%] lg:max-w-[90%]";

            const icon = role === 'user' ? 'user' : 'bot';
            const bgColor = role === 'user' ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-white text-slate-800 rounded-tl-none border border-slate-100';
            const iconBg = role === 'user' ? 'bg-slate-800 text-white' : 'bg-blue-100 text-blue-600';

            const content = role === 'bot' ? formatMarkdown(text) : `<p class="text-sm">${text}</p>`;

            messageDiv.innerHTML = `
                <div class="w-7 h-7 lg:w-8 lg:h-8 rounded-full ${iconBg} flex items-center justify-center shrink-0">
                    <i data-lucide="${icon}" class="w-3 h-3 lg:w-4 lg:h-4"></i>
                </div>
                <div class="${bgColor} p-3 lg:p-4 rounded-2xl shadow-sm overflow-hidden">
                    ${content}
                    <span class="text-[9px] lg:text-[10px] ${role === 'user' ? 'opacity-70 text-right' : 'text-slate-400'} mt-2 block">${time}</span>
                </div>
            `;
            chatContainer.appendChild(messageDiv);
            lucide.createIcons();
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showTypingIndicator() {
            const id = 'typing-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = "flex gap-3 max-w-[80%] animate-pulse";
            div.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-blue-50 flex items-center justify-center text-blue-400">
                    <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>
                </div>
                <div class="bg-white border border-slate-100 p-3 rounded-2xl rounded-tl-none">
                    <div class="flex gap-1">
                        <div class="w-1.5 h-1.5 bg-slate-300 rounded-full animate-bounce"></div>
                        <div class="w-1.5 h-1.5 bg-slate-300 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                        <div class="w-1.5 h-1.5 bg-slate-300 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                    </div>
                </div>
            `;
            chatContainer.appendChild(div);
            lucide.createIcons();
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return id;
        }

        function removeTypingIndicator(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }
    </script>
</body>

</html>
